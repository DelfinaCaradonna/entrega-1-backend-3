version: '3.8'

services:
  # Aplicación Node.js
  app:
    build: .
    container_name: adoptme-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/adoptme
    depends_on:
      - mongo
    networks:
      - adoptme-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:6.0
    container_name: adoptme-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - adoptme-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  adoptme-network:
    driver: bridge